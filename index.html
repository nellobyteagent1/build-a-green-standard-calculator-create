<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-op" onclick="toggleSign()">+/&minus;</button>
      <button class="btn-op" onclick="inputPercent()">%</button>
      <button class="btn-op" data-op="/" onclick="inputOp('/')">&divide;</button>

      <button class="btn-digit" onclick="inputDigit('7')">7</button>
      <button class="btn-digit" onclick="inputDigit('8')">8</button>
      <button class="btn-digit" onclick="inputDigit('9')">9</button>
      <button class="btn-op" data-op="*" onclick="inputOp('*')">&times;</button>

      <button class="btn-digit" onclick="inputDigit('4')">4</button>
      <button class="btn-digit" onclick="inputDigit('5')">5</button>
      <button class="btn-digit" onclick="inputDigit('6')">6</button>
      <button class="btn-op" data-op="-" onclick="inputOp('-')">&minus;</button>

      <button class="btn-digit" onclick="inputDigit('1')">1</button>
      <button class="btn-digit" onclick="inputDigit('2')">2</button>
      <button class="btn-digit" onclick="inputDigit('3')">3</button>
      <button class="btn-op" data-op="+" onclick="inputOp('+')">+</button>

      <button class="btn-digit btn-zero" onclick="inputDigit('0')">0</button>
      <button class="btn-digit" onclick="inputDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script src="calculator.js"></script>
</body>
</html>
